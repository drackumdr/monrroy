<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monrroy</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder {
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-family: sans-serif;
      font-size: clamp(1rem, 5vmin, 3rem);
      letter-spacing: 0.05em;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="placeholder">Placeholder</div>
</body>
</html>
